  - id: "case_019"
    category: 旅行
    difficulty: easy
    description: "St Maarten Landing"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我把这个旅行视频里风景最好看的片段剪出来，做成一个90秒以内的短片，要有电影感，飞机降落、海岛全景的画面优先"

  - id: "case_020"
