  # ====== 边界场景 (10 组) ======
  # 异常输入/边界条件测试，预期行为：不崩溃，返回合理错误或降级处理
  - id: "case_026"
    category: 边界
    difficulty: edge
    description: "空视频文件（0 字节）"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我把这个视频的精彩片段剪出来，60秒以内"

  - id: "case_027"
    category: 边界
    difficulty: edge
    description: "video.mp4 是文本文件改名"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我把这个视频的精彩片段剪出来，60秒以内"

  - id: "case_028"
    category: 边界
    difficulty: edge
    description: "video.mp4 是图片文件改名"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我把这个视频的精彩片段剪出来，60秒以内"

  - id: "case_029"
    category: 边界
    difficulty: edge
    description: "空 instruction.json"
    video_file: "video.mp4"
    instruction:
      prompt: ""

  - id: "case_030"
    category: 边界
    difficulty: edge
    description: "非法 JSON 格式的 instruction"
    video_file: "video.mp4"
    instruction:
      prompt: ""

  - id: "case_031"
    category: 边界
    difficulty: edge
    description: "超长 instruction（5000 字）"
    video_file: "video.mp4"
    instruction:
      prompt: "请帮我剪辑这个视频。要求非常详细：第一，需要识别出画面变化剧烈的片段..."

  - id: "case_032"
    category: 边界
    difficulty: edge
    description: "视频无音频流"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我把这个视频的精彩片段剪出来，60秒以内，快节奏"

  - id: "case_033"
    category: 边界
    difficulty: edge
    description: "instruction 含特殊字符和 emoji"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我剪辑高光片段！要求：燃向、快节奏、精彩画面。特殊字符测试：<script>alert('xss')</script>"

  - id: "case_034"
    category: 边界
    difficulty: edge
    description: "instruction 只有空格"
    video_file: "video.mp4"
    instruction:
      prompt: ""

  - id: "case_035"
    category: 边界
    difficulty: edge
    description: "ground_truth 为空"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我把这个视频的精彩片段剪出来，60秒以内"
