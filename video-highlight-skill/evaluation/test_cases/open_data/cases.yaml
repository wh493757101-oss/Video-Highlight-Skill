# 本地视频测试用例 — 基于 SumMe 数据集 (25 组)
# 视频来源: SumMe (Creating Summaries from User Videos, ECCV 2014)
# 标注转换: gt_score 帧级重要度 → 连续高光片段
#
# 目录结构:
#   local/case_XXX/
#   ├── video.mp4           # 原始视频
#   ├── instruction.json    # 自然语言剪辑指令
#   ├── ground_truth.json   # 期望高光片段
#   └── metadata.yaml       # 用例元信息

cases:

  # ====== 旅行 (7 组) ======
  - id: "case_001"
    category: 旅行
    difficulty: medium
    description: "Air_Force_One"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我把这个旅行视频里风景最好看的片段剪出来，做成一个90秒以内的短片，要有电影感，画面壮观的优先，保留飞机和云海的镜头"

  - id: "case_007"
    category: 旅行
    difficulty: hard
    description: "Cockpit_Landing"
    video_file: "video.mp4"
    instruction:
      prompt: "帮我把这个飞行视频里风景最好看的片段剪出来，做成一个90秒以内的短片，要有电影感，驾驶舱视角、降落过程的画面优先"

  - id: "case_009"
    category: 旅行
    difficulty: hard
